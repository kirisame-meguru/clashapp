<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <!-- Each element is drawn in its own scaled local space, so the gradient
         coords are expressed in that space but mapped to the same root y≈170→870
         band, giving one continuous light-top → dark-bottom gradient. -->
    <linearGradient id="ink-shield" x1="12" y1="1.2" x2="12" y2="23.7" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f4d83"/>
      <stop offset="1" stop-color="#112546"/>
    </linearGradient>
    <linearGradient id="ink-bolt" x1="24" y1="-31.1" x2="24" y2="83.7" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f4d83"/>
      <stop offset="1" stop-color="#112546"/>
    </linearGradient>
  </defs>

  <!-- rounded-square background, white to match attached image -->
  <rect width="1024" height="1024" rx="230" fill="#ffffff"/>

  <!-- shield outline (lucide-react Shield), navy ink -->
  <g transform="translate(512 506) scale(31) translate(-12 -12)">
    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"
      fill="none" stroke="url(#ink-shield)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- lightning bolt (favicon shape), navy ink fill -->
  <g transform="translate(512 500) scale(6.1) translate(-24 -23)">
    <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"
      fill="url(#ink-bolt)"/>
  </g>
</svg>
